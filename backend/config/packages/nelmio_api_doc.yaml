nelmio_api_doc:
    documentation:
        info:
            title: Chilllink API
            description: Official OpenAPI documentation for Chilllink API (Symfony 6.4 + JWT).
            version: 1.1.0
        components:
            securitySchemes:
                bearerAuth:
                    type: http
                    scheme: bearer
                    bearerFormat: JWT
        security:
            - bearerAuth: []
        paths:
            /api/login_check:
                post:
                    tags: [Authentication]
                    summary: Authenticate a user and return a JWT token
                    description: Public endpoint used by the frontend to retrieve a bearer token.
                    security: []
                    requestBody:
                        required: true
                        content:
                            application/json:
                                schema:
                                    type: object
                                    required: [email, password]
                                    properties:
                                        email:
                                            type: string
                                            format: email
                                            example: user@email.com
                                        password:
                                            type: string
                                            format: password
                                            example: password123
                    responses:
                        '200':
                            description: Authentication successful
                            content:
                                application/json:
                                    schema:
                                        type: object
                                        properties:
                                            token:
                                                type: string
                                                example: eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9...
                        '401':
                            description: Invalid credentials

    areas:
        path_patterns:
            - ^/api(?!/doc$|/doc\.json$)
