services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chilllink_api
    restart: always
    ports:
      - "8888:80"
    env_file:
      - ./backend/.env
    environment:
      APP_SECRET: "${APP_SECRET:?APP_SECRET is required}"
      JWT_PASSPHRASE: "${JWT_PASSPHRASE:?JWT_PASSPHRASE is required}"
      DATABASE_URL: "${DATABASE_URL:?DATABASE_URL is required}"
      MERCURE_JWT_SECRET: "${MERCURE_JWT_SECRET:?MERCURE_JWT_SECRET is required}"
    depends_on:
      - db
    volumes:
      - ./backend:/var/www/html
    networks:
      - chilllink-net

  db:
    image: postgres:16
    container_name: chilllink_db
    restart: always
    environment:
      POSTGRES_USER: "${POSTGRES_USER:?POSTGRES_USER is required}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      POSTGRES_DB: "${POSTGRES_DB:?POSTGRES_DB is required}"
    volumes:
      - ./docker/db/data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - chilllink-net

  adminer:
    image: adminer:latest
    container_name: chilllink_adminer
    restart: always
    ports:
      - "8082:8080"
    depends_on:
      - db
    environment:
      ADMINER_DEFAULT_SERVER: db
    networks:
      - chilllink-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chilllink_frontend
    restart: always
    ports:
      - "5174:5174"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - chilllink-net

  mercure:
    image: dunglas/mercure
    container_name: chilllink_mercure
    restart: unless-stopped
    environment:
      SERVER_NAME: ':3000'
      MERCURE_PUBLISHER_JWT_KEY: "${MERCURE_JWT_SECRET:?MERCURE_JWT_SECRET is required}"
      MERCURE_SUBSCRIBER_JWT_KEY: "${MERCURE_JWT_SECRET:?MERCURE_JWT_SECRET is required}"
      MERCURE_JWT_SECRET: "${MERCURE_JWT_SECRET:?MERCURE_JWT_SECRET is required}"
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins http://localhost:5174
        cors_credentials true
        anonymous
    ports:
      - "8085:3000"
    networks:
      - chilllink-net



networks:
  chilllink-net:
    driver: bridge
